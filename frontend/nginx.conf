# Serve the SPA and proxy API + WebSocket to the backend service (Phase 5).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST + WebSocket → backend. "backend" is the compose service name.
    location /runs {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    location /webhooks { proxy_pass http://backend:8000; }
    location /metrics  { proxy_pass http://backend:8000; }
    location /health   { proxy_pass http://backend:8000; }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
